<section class="bg-black relative overflow-hidden py-16">
  <!-- Large Rupee symbol and road graphic overlay -->
  <div class="absolute right-0 top-0 bottom-0 w-1/3 opacity-50 z-0 flex items-center justify-end pointer-events-none">
    <div class="text-[300px] leading-none text-gray-800 font-bold select-none pr-10 translate-x-1/4">₹</div>
  </div>

  <div class="container mx-auto px-6 lg:px-12 relative z-10">
    <!-- Header/Logo area -->
    <div class="flex items-center mb-8">
      <div class="bg-white rounded-md p-1 mr-3 flex items-center justify-center w-10 h-10">
        <div class="w-4 h-6 bg-delhivery-red"></div>
        <div class="w-2 h-6 bg-black ml-1"></div>
      </div>
      <span class="text-delhivery-red text-2xl font-bold">Freight Index</span>
      <span class="text-white text-xl ml-2 font-light">ONE</span>
    </div>

    <!-- Title and Subtitle -->
    <h2 class="text-white text-4xl md:text-5xl font-bold mb-4">Know your price before you book</h2>
    <p class="text-white text-lg mb-10">Check real-time freight rates for Full Truck Load vehicles across India.</p>

    <!-- Cards container -->
    <div class="flex flex-wrap gap-4">
      @for (route of routes; track route.from) {
        <div 
          class="bg-white rounded-md p-5 flex flex-col justify-between w-[160px] h-[180px] cursor-pointer hover:shadow-lg transition-shadow group"
          (click)="navigateToFreightIndex()"
        >
          <div class="flex justify-between items-start">
            <svg class="w-6 h-6 text-delhivery-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
              <!-- A simplified truck icon -->
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"></path>
            </svg>
            <svg class="w-5 h-5 text-gray-400 group-hover:text-black transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
            </svg>
          </div>
          <div class="mt-4 text-sm font-medium text-gray-900">
            <div>{{ route.from }}</div>
            <div class="text-gray-500 my-1 font-normal">to</div>
            <div>{{ route.to }}</div>
          </div>
        </div>
      }

      <!-- Other routes card -->
      <div 
        class="bg-delhivery-red rounded-md p-5 flex flex-col justify-between w-[160px] h-[180px] cursor-pointer hover:bg-red-700 transition-colors group"
        (click)="navigateToFreightIndex()"
      >
        <div class="flex justify-end">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </div>
        <div class="text-white font-bold text-lg leading-tight">
          Check prices<br/>for other<br/>routes
        </div>
      </div>
    </div>
  </div>
</section>
