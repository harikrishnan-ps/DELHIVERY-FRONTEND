<div class="booking-container">
  <!-- Header -->
  <header class="booking-header">
    <div class="header-content">
      <!-- Logo -->
      <div class="logo-container" (click)="navigateToHome()" style="cursor: pointer;">
        <img src="assets/images/logo.svg" alt="Delhivery Logo" class="logo" />
      </div>

      <!-- Stepper -->
      <div class="stepper-container">
        <div class="step" *ngFor="let step of steps; let i = index; let isLast = last"
             [class.active]="i === currentStepIndex"
             [class.completed]="i < currentStepIndex">
             
          <div class="step-indicator">
            <div class="circle">
              <div class="inner-dot" *ngIf="i === currentStepIndex || i < currentStepIndex"></div>
              <svg *ngIf="i < currentStepIndex" class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          
          <div class="step-label">{{ step.label }}</div>
          
          <!-- Connecting Line -->
          <div class="step-line" *ngIf="!isLast" [class.filled]="i < currentStepIndex"></div>
        </div>
      </div>
      
      <!-- Empty div for right side balance if needed, or we can just use flex box -->
      <div class="header-spacer"></div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="booking-main">
    <router-outlet></router-outlet>
  </main>
</div>
