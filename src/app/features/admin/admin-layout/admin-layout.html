<div class="min-h-screen bg-gray-50 flex flex-col md:flex-row">
  
  <!-- Sidebar -->
  <aside class="w-full md:w-64 bg-[#1e2330] text-white flex flex-col shadow-2xl">
    <div class="p-6 border-b border-gray-700 flex items-center gap-3">
      <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-bold text-xl tracking-tighter">D</div>
      <h1 class="text-2xl font-bold tracking-tight">Admin<span class="text-red-500">Panel</span></h1>
    </div>
    
    <nav class="flex-1 p-4 space-y-2">
      <a routerLink="/admin/dashboard" routerLinkActive="bg-red-600 text-white" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 text-gray-300 rounded-lg font-medium transition-colors">
        <span>📊</span> Dashboard
      </a>
      <a routerLink="/admin/shipments" routerLinkActive="bg-red-600 text-white" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 text-gray-300 rounded-lg font-medium transition-colors">
        <span>📦</span> Shipments
      </a>
      <a routerLink="/admin/users" routerLinkActive="bg-red-600 text-white" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 text-gray-300 rounded-lg font-medium transition-colors">
        <span>👥</span> Users
      </a>
      <a routerLink="/admin/settings" routerLinkActive="bg-red-600 text-white" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-800 text-gray-300 rounded-lg font-medium transition-colors">
        <span>⚙️</span> Settings
      </a>
    </nav>
    
    <div class="p-4 border-t border-gray-700">
      <button (click)="logout()" class="flex items-center gap-3 px-4 py-3 w-full hover:bg-gray-800 text-red-400 hover:text-red-300 rounded-lg font-medium transition-colors">
        <span>🚪</span> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto">
    <!-- Topbar -->
    <header class="bg-white border-b border-gray-200 p-4 px-8 flex justify-between items-center sticky top-0 z-10 shadow-sm">
      <div class="relative">
        <input type="text" placeholder="Search..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 shadow-sm w-64 transition-all bg-gray-50">
        <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
      </div>
      <div class="flex items-center gap-6">
        <button class="relative text-gray-500 hover:text-red-600 transition-colors">
          <span class="absolute -top-1 -right-1 bg-red-600 w-3 h-3 rounded-full border-2 border-white"></span>
          <span>🔔</span>
        </button>
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border-2 border-white shadow-md cursor-pointer">
            <img src="https://i.pravatar.cc/100?img=11" alt="Admin" class="w-full h-full object-cover">
          </div>
          <button (click)="logout()" class="text-sm font-semibold text-gray-600 hover:text-red-600 transition-colors flex items-center gap-1 bg-gray-50 hover:bg-red-50 px-3 py-1.5 rounded-md border border-gray-200 hover:border-red-200">
            <span>🚪</span> Logout
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <div class="p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
