<div class="orders-container">
  
  <!-- Tabs -->
  <div class="tabs-header">
    <button *ngFor="let tab of tabs" 
            class="tab-btn" 
            [class.active]="activeTab === tab"
            (click)="setTab(tab)">
      {{ tab }}
    </button>
  </div>

  <!-- Orders List -->
  <div class="orders-list">
    <div class="order-card" *ngFor="let order of filteredOrders">
      
      <!-- Card Header -->
      <div class="order-header">
        <div class="header-left">
          <div class="box-icon">
            <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png" alt="box" />
          </div>
          <div class="status-info">
            <h3 class="status-title">{{ order.status }}</h3>
            <p class="status-desc">{{ order.statusDetail }}</p>
          </div>
        </div>
        <div class="header-right">
          <span class="type-badge">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
            {{ order.type }}
          </span>
        </div>
      </div>

      <!-- Route Info -->
      <div class="route-info">
        <div class="route-point pickup">
          <div class="point-icon blue"></div>
          <div class="point-details">
            <span class="name">{{ order.pickup.name }} <span class="label">(Pickup)</span></span>
            <span class="location">{{ order.pickup.city }} - {{ order.pickup.pincode }}</span>
          </div>
        </div>
        <div class="route-line"></div>
        <div class="route-point delivery">
          <div class="point-icon red">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </div>
          <div class="point-details">
            <span class="name">{{ order.delivery.name }} <span class="label">(Delivery)</span></span>
            <span class="location">{{ order.delivery.city }} - {{ order.delivery.pincode }}</span>
          </div>
        </div>
      </div>

      <!-- Warning Block -->
      <div class="warning-block" *ngIf="order.warningTitle">
        <h4 class="warning-title">{{ order.warningTitle }}</h4>
        <p class="warning-message">{{ order.warningMessage }}</p>
      </div>

      <!-- View Details Button -->
      <div class="card-footer">
        <button class="view-details-btn">View Details &rarr;</button>
      </div>

    </div>

  </div>

</div>
