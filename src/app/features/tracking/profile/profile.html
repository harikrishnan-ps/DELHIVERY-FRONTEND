<div class="card">
  <div class="card-header">
    <h2 class="card-title">Profile</h2>
  </div>
  
  <div class="card-body">
    <form (ngSubmit)="saveChanges()">
      <!-- Full Name -->
      <div class="form-group mb-4">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="fullName" name="fullName" class="form-control" placeholder="Enter full name" />
      </div>
      
      <!-- Phone & Email Row -->
      <div class="form-row">
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" [(ngModel)]="phoneNumber" name="phoneNumber" class="form-control disabled" disabled />
        </div>
        
        <div class="form-group">
          <label>Email ID</label>
          <input type="email" [(ngModel)]="emailId" name="emailId" class="form-control" placeholder="Enter your email ID" />
        </div>
      </div>
      
      <div class="form-actions mt-8 text-right">
        <button type="submit" class="btn-dark">Save Changes</button>
      </div>
    </form>
  </div>
</div>
