<div class="addresses-container">
  
  <div class="header-section">
    <h2 class="title">Saved Addresses</h2>
    <button class="add-btn" (click)="toggleAddForm()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      {{ showAddForm ? 'Cancel' : 'Add New Address' }}
    </button>
  </div>

  <div class="add-form-container" *ngIf="showAddForm">
    <h3 class="form-title">New Address Details</h3>
    <form (ngSubmit)="saveAddress()" #addressForm="ngForm" class="address-form">
      <div class="form-row">
        <div class="form-group">
          <label>Contact Name</label>
          <input type="text" [(ngModel)]="newAddress.contactName" name="contactName" required>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="text" [(ngModel)]="newAddress.mobileNumber" name="mobileNumber" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Flat / House No.</label>
          <input type="text" [(ngModel)]="newAddress.flat" name="flat">
        </div>
        <div class="form-group">
          <label>Area / Street</label>
          <input type="text" [(ngModel)]="newAddress.area" name="area">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" [(ngModel)]="newAddress.city" name="city" required>
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" [(ngModel)]="newAddress.state" name="state" required>
        </div>
        <div class="form-group">
          <label>Pincode</label>
          <input type="text" [(ngModel)]="newAddress.pincode" name="pincode" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tag (e.g., Home, Work)</label>
          <input type="text" [(ngModel)]="newAddress.tag" name="tag">
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="save-btn" [disabled]="!addressForm.form.valid">Save Address</button>
      </div>
    </form>
  </div>

  <div class="addresses-grid">
    <div class="address-card" *ngFor="let addr of addresses">
      
      <div class="card-header">
        <h3 class="name">{{ addr.name }}</h3>
        <button class="menu-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
        </button>
      </div>

      <p class="address-text">{{ addr.address }}</p>

      <div class="card-footer">
        <div class="tag">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          {{ addr.tag }}
        </div>
        <div class="phone">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          {{ addr.phone }}
        </div>
      </div>

    </div>
  </div>

</div>
