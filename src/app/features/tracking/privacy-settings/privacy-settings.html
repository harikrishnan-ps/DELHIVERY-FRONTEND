<div class="privacy-container">
  
  <div class="header-section">
    <a routerLink="../" class="back-btn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </a>
    <h2 class="title">Privacy and Notifications</h2>
  </div>

  <div class="settings-list">
    
    <div class="setting-item" *ngFor="let setting of settings; let i = index">
      <p class="setting-label">{{ setting.label }}</p>
      
      <label class="toggle-switch">
        <input type="checkbox" [checked]="setting.checked" (change)="toggleSetting(i)">
        <span class="slider round"></span>
      </label>
    </div>

  </div>

</div>
