<div class="tracking-layout-container">
  
  <!-- Header -->
  <header class="tracking-header">
    <div class="header-content">
      <!-- Logo -->
      <div class="logo-container" (click)="navigateToHome()">
        <img src="https://www.delhivery.com/assets/images/logo.svg" alt="Delhivery Logo" class="logo-img" />
      </div>
      
      <!-- Right Actions -->
      <div class="header-actions">
        <button class="book-now-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Book Now
        </button>
        <div class="user-avatar">
          HS
        </div>
      </div>
    </div>
  </header>

  <!-- Main Body Layout -->
  <main class="tracking-main">
    <div class="tracking-content-wrapper">
      
      <!-- Sidebar -->
      <aside class="tracking-sidebar">
        <nav class="sidebar-nav">
          <ul class="nav-list">
            <li *ngFor="let item of menuItems">
              <a [routerLink]="item.route" 
                 class="nav-link"
                 [class.active]="currentUrl.includes(item.route)">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path [attr.d]="item.icon" />
                  <circle *ngIf="item.label === 'Settings'" cx="12" cy="12" r="3" />
                  <circle *ngIf="item.label === 'Saved Addresses'" cx="12" cy="10" r="3" />
                </svg>
                <span>{{ item.label }}</span>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Content Area -->
      <section class="tracking-content">
        <router-outlet></router-outlet>
      </section>
      
    </div>
  </main>

</div>
